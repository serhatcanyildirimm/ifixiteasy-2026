<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iFixItEasy | Admin Toestellen</title>
    <link rel="stylesheet" href="../assets/css/admin.css?v=7" />
  </head>
  <body class="admin-body">
    <main class="admin-layout-root">
      <section id="admin-login-panel" class="login-card">
        <p class="login-card__kicker">iFixItEasy Admin</p>
        <h1 class="login-card__title">Inloggen</h1>
        <p class="login-card__subtitle">Log in om toestellen te beheren.</p>
        <form id="admin-login-form" class="form-stack">
          <label class="field-label" for="adminEmail">E-mail</label>
          <input id="adminEmail" class="field-control" type="email" required />
          <label class="field-label" for="adminPassword">Wachtwoord</label>
          <input id="adminPassword" class="field-control" type="password" required />
          <button class="btn btn--primary" type="submit">Inloggen</button>
        </form>
        <p class="admin-feedback" id="admin-login-feedback" role="status"></p>
      </section>

      <section id="admin-dashboard" class="workspace hidden">
        <aside class="dashboard__sidebar">
          <div class="brand-card">
            <h2 class="brand-card__title">iFixItEasy Admin</h2>
            <p class="brand-card__subtitle">Duidelijke navigatie</p>
          </div>
          <nav class="side-nav">
            <a class="side-nav__item" href="./index.html">Overzicht</a>
            <a class="side-nav__item active" href="./toestellen.html">Toestellen</a>
            <a class="side-nav__item" href="./beschikbaarheid.html">Beschikbaarheid</a>
            <a class="side-nav__item" href="./afspraken.html">Afspraken</a>
            <a class="side-nav__item" href="./veiligheid.html">Veiligheid</a>
          </nav>
        </aside>

        <div>
          <header class="workspace-topbar">
            <div class="workspace-topbar__brand">
              <h1>Toestellen beheren</h1>
              <p>Voeg toestellen toe, bewerk ze en zet ze actief/inactief.</p>
            </div>
            <div class="workspace-topbar__actions">
              <button id="admin-logout-btn" class="btn btn--secondary" type="button">Uitloggen</button>
            </div>
          </header>

          <section class="workspace-grid">
            <article class="surface">
              <h2 class="surface__title">Toestel formulier</h2>
              <form id="phone-create-form" class="form-grid form-grid--two">
                <label class="field-label field-control--wide" for="phoneDeviceCategory">Productcategorie</label>
                <select id="phoneDeviceCategory" class="field-control field-control--wide" required>
                  <option value="smartphone">Smartphone</option>
                  <option value="laptop">Laptop</option>
                  <option value="tablet">Tablet</option>
                  <option value="console">Console</option>
                  <option value="computer">Computer</option>
                  <option value="watch">Smartwatch</option>
                </select>
                <input id="phoneBrand" class="field-control" type="text" placeholder="Merk (bijv. Apple)" required />
                <input id="phoneModel" class="field-control" type="text" placeholder="Model (bijv. iPhone 14)" required />
                <input id="phoneImageUrl" class="field-control field-control--wide" type="url" placeholder="Afbeelding URL (optioneel)" />
                <input id="phoneImageFile" class="field-control field-control--wide" type="file" accept="image/png,image/jpeg,image/webp" />
                <button class="btn btn--primary" type="submit">Opslaan</button>
                <button id="phone-form-reset-btn" class="btn btn--secondary" type="button">Nieuw</button>
              </form>
              <input id="phoneEditId" type="hidden" />
              <input id="phoneEditIsActive" type="hidden" value="true" />
              <div id="phone-image-preview" class="phone-image-preview hidden"></div>
              <div id="phones-list" class="admin-list"></div>
            </article>
          </section>
        </div>
      </section>
    </main>
    <script src="../assets/js/admin.js"></script>
  </body>
</html>
