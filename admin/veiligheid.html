<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iFixItEasy | Admin Veiligheid</title>
    <link rel="stylesheet" href="../assets/css/admin.css?v=6" />
  </head>
  <body class="admin-body">
    <main class="admin-layout-root">
      <section id="admin-login-panel" class="login-card">
        <p class="login-card__kicker">iFixItEasy Admin</p>
        <h1 class="login-card__title">Inloggen</h1>
        <p class="login-card__subtitle">Log in om beveiligingsinstellingen te beheren.</p>
        <form id="admin-login-form" class="form-stack">
          <label class="field-label" for="adminEmail">E-mail</label>
          <input id="adminEmail" class="field-control" type="email" required />
          <label class="field-label" for="adminPassword">Wachtwoord</label>
          <input id="adminPassword" class="field-control" type="password" required />
          <button class="btn btn--primary" type="submit">Inloggen</button>
        </form>
        <p class="admin-feedback" id="admin-login-feedback" role="status"></p>
      </section>

      <section id="admin-dashboard" class="workspace hidden">
        <aside class="dashboard__sidebar">
          <div class="brand-card">
            <h2 class="brand-card__title">iFixItEasy Admin</h2>
            <p class="brand-card__subtitle">Duidelijke navigatie</p>
          </div>
          <nav class="side-nav">
            <a class="side-nav__item" href="./index.html">Overzicht</a>
            <a class="side-nav__item" href="./toestellen.html">Toestellen</a>
            <a class="side-nav__item" href="./beschikbaarheid.html">Beschikbaarheid</a>
            <a class="side-nav__item" href="./afspraken.html">Afspraken</a>
            <a class="side-nav__item active" href="./veiligheid.html">Veiligheid</a>
          </nav>
        </aside>

        <div>
          <header class="workspace-topbar">
            <div class="workspace-topbar__brand">
              <h1>Veiligheid</h1>
              <p>Wijzig het admin wachtwoord op een aparte pagina.</p>
            </div>
            <div class="workspace-topbar__actions">
              <button id="admin-logout-btn" class="btn btn--secondary" type="button">Uitloggen</button>
            </div>
          </header>

          <section class="workspace-grid">
            <article class="surface">
              <h2 class="surface__title">Wachtwoord wijzigen</h2>
              <form id="admin-password-form" class="form-grid form-grid--two">
                <input id="currentPassword" class="field-control" type="password" placeholder="Huidig wachtwoord" required />
                <input id="newPassword" class="field-control" type="password" placeholder="Nieuw wachtwoord" required />
                <input id="confirmPassword" class="field-control field-control--wide" type="password" placeholder="Bevestig nieuw wachtwoord" required />
                <button class="btn btn--primary field-control--wide" type="submit">Wachtwoord opslaan</button>
              </form>
              <p class="admin-feedback" id="password-feedback" role="status"></p>
            </article>
          </section>
        </div>
      </section>
    </main>
    <script src="../assets/js/admin.js"></script>
  </body>
</html>
