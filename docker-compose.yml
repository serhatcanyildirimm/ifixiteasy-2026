services:
  postgres:
    image: postgres:17
    container_name: ifixiteasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ifixiteasy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ifixiteasy"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
